server.port=8084
spring.application.name=notification-service

# Kafka Consumer Properties
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages="com.paz252.ecommerce.order.event,com.paz252.ecommerce.notification.event"

# External Mock Gateway API Integration Details
external.api.mock-provider-url=https://jsonplaceholder.typicode.com
# Sandbox fallback mock address

eureka.client.service-url..defaultZone=http://localhost:8761/eureka/

management.endpoints.web.exposure.include=health,info