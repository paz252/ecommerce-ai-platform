server.port=8080

spring.application.name=api-gateway
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Dynamic Route to Product & Catalog Service
spring.cloud.gateway.server.webflux.routes[0].id=product-service
spring.cloud.gateway.server.webflux.routes[0].uri: lb://product-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/products/**

# Dynamic Route to Order Processing Service
spring.cloud.gateway.server.webflux.routes[1].id=order-service
spring.cloud.gateway.server.webflux.routes[1].uri: lb://order-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/orders/**

# Dynamic Route to AI Chatbot Assistant Service
spring.cloud.gateway.server.webflux.routes[2].id=ai-service
spring.cloud.gateway.server.webflux.routes[2].uri: lb://ai-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/ai/**

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.service-url.fetch-registry=true
eureka.client.service-url.register-with-eureka=true

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
